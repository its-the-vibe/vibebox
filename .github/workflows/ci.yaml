name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  goquery:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: goquery

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: goquery/go.mod

      - name: Check formatting
        run: go fmt ./...

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...
